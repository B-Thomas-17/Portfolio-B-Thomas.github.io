<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filigraner by Baptiste / Copilote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0f1f 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #fff;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            padding: 8px 16px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: #8b5cf6;
            font-weight: 600;
            letter-spacing: 1px;
        }
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ffffff 0%, #a0aec0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 18px;
            color: #8b5cf6;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .description {
            font-size: 14px;
            color: #a0aec0;
            max-width: 600px;
            margin: 0 auto;
        }
        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .config-section {
            background: rgba(30, 30, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            padding: 30px;
        }
        .section-title {
            font-size: 12px;
            color: #8b5cf6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-weight: 500;
            font-size: 14px;
            color: #cbd5e0;
        }
        input[type="file"],
        input[type="text"],
        input[type="number"],
        input[type="range"],
        textarea,
        select {
            padding: 12px;
            background: rgba(15, 15, 25, 0.6);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 8px;
            font-size: 14px;
            color: #fff;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        input[type="file"]:hover,
        input[type="text"]:hover,
        input[type="number"]:hover,
        textarea:hover,
        select:hover {
            border-color: rgba(139, 92, 246, 0.4);
            background: rgba(15, 15, 25, 0.8);
        }
        input[type="file"]:focus,
        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.05);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .char-count {
            font-size: 12px;
            color: #718096;
            margin-top: 4px;
        }
        .value-display {
            font-size: 12px;
            color: #8b5cf6;
            margin-top: 4px;
            font-weight: 500;
        }
        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .preview-section {
            background: rgba(30, 30, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }
        canvas {
            max-width: 100%;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 8px;
            margin-top: 20px;
            background: rgba(15, 15, 25, 0.4);
        }
        .download-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            margin-top: 20px;
        }
        .download-btn:hover {
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        }
        @media (max-width: 768px) {
            .main-wrapper {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 32px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div class="header">
        <div class="logo">🎨 FILIGRANE</div>
        <h1>Des filigranes parfaits,<br><span class="subtitle">générés localement.</span></h1>
        <p class="description">Aucune donnée ne quitte votre appareil. Tous vos documents et images restent privés et sécurisés.</p>
    </div>

    <div class="main-wrapper">
        <div class="config-section">
            <div class="section-title">CONFIGURATION</div>
            <div class="controls">
                <div class="control-group">
                    <label for="imageInput">Selectionner une image ou un PDF:</label>
                    <input type="file" id="imageInput" accept="image/*,.pdf">
                </div>
                
                <div class="control-group">
                    <label for="watermarkText">Texte du filigrane (max 50 caractères):</label>
                    <textarea id="watermarkText" maxlength="50" placeholder="Entrez votre texte..."></textarea>
                    <div class="char-count"><span id="charCount">0</span>/50</div>
                </div>
                
                <div class="control-group">
                    <label for="style">Style:</label>
                    <select id="style">
                        <option value="normal">Normal</option>
                        <option value="bold">Gras</option>
                        <option value="italic">Italique</option>
                        <option value="shadow">Ombre</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="angle">Angle (degrés):</label>
                    <input type="number" id="angle" min="0" max="360" value="45" step="5">
                </div>
                
                <div class="control-group">
                    <label for="fontSize">Taille de police:</label>
                    <input type="number" id="fontSize" min="10" max="150" value="50" step="5">
                </div>
                
                <div class="control-group">
                    <label for="opacity">Opacité (%):</label>
                    <input type="range" id="opacity" min="10" max="100" value="50" step="10">
                    <div class="value-display">Opacité: <span id="opacityValue">50</span>%</div>
                </div>
                
                <div class="control-group">
                    <label for="mode">Mode filigrane:</label>
                    <select id="mode">
                        <option value="center">Au centre</option>
                        <option value="repeat">Répété</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label for="repeatTaux">Taux de répétition:</label>
                    <input type="range" id="repeatTaux" min="1" max="5" value="2" step="0.5">
                    <div class="value-display">Espacements: <span id="repeatTauxValue">2</span>x</div>
                </div>
                
                <button onclick="generateWatermark()">Générer le filigrane</button>
            </div>
        </div>
        
        <div class="preview-section">
            <div class="section-title">RÉSULTAT</div>
            <canvas id="canvas"></canvas>
            <button class="download-btn" onclick="downloadImage()" style="display:none;" id="downloadBtn">⬇️ Télécharger l'image</button>
        </div>
    </div>

    <script>
        let uploadedImage = null;
        
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            
            if (file.type === 'application/pdf') {
                // Charger le PDF
                const reader = new FileReader();
                reader.onload = function(event) {
                    const uint8Array = new Uint8Array(event.target.result);
                    pdfjsLib.getDocument(uint8Array).promise.then(pdf => {
                        pdf.getPage(1).then(page => {
                            const canvas = document.createElement('canvas');
                            const context = canvas.getContext('2d');
                            const viewport = page.getViewport({ scale: 2 });
                            
                            canvas.width = viewport.width;
                            canvas.height = viewport.height;
                            
                            page.render({
                                canvasContext: context,
                                viewport: viewport
                            }).promise.then(() => {
                                uploadedImage = new Image();
                                uploadedImage.onload = function() {
                                    generateWatermark();
                                };
                                uploadedImage.src = canvas.toDataURL();
                            });
                        });
                    }).catch(err => {
                        alert('Erreur lors de la lecture du PDF.');
                        console.error(err);
                    });
                };
                reader.readAsArrayBuffer(file);
            } else if (file.type.startsWith('image/')) {
                // Charger l'image
                const reader = new FileReader();
                reader.onload = function(event) {
                    uploadedImage = new Image();
                    uploadedImage.onload = function() {
                        generateWatermark();
                    };
                    uploadedImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                alert('Seules les images et les PDFs sont acceptes.');
                this.value = '';
            }
        });
        
        document.getElementById('watermarkText').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
            if(uploadedImage) generateWatermark();
        });
        
        document.getElementById('opacity').addEventListener('input', function() {
            document.getElementById('opacityValue').textContent = this.value;
            if(uploadedImage) generateWatermark();
        });
        
        document.getElementById('repeatTaux').addEventListener('input', function() {
            document.getElementById('repeatTauxValue').textContent = this.value;
            if(uploadedImage) generateWatermark();
        });
        
        ['style', 'angle', 'fontSize', 'mode'].forEach(id => {
            document.getElementById(id).addEventListener('change', function() {
                if(uploadedImage) generateWatermark();
            });
        });
        
        function generateWatermark() {
            if(!uploadedImage) {
                alert('Veuillez d\'abord sélectionner une image');
                return;
            }
            
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = uploadedImage.width;
            canvas.height = uploadedImage.height;
            
            ctx.drawImage(uploadedImage, 0, 0);
            
            const text = document.getElementById('watermarkText').value || 'Filigrane';
            const angle = document.getElementById('angle').value;
            const fontSize = document.getElementById('fontSize').value;
            const opacity = document.getElementById('opacity').value / 100;
            const style = document.getElementById('style').value;
            const mode = document.getElementById('mode').value;
            
            ctx.save();
            ctx.globalAlpha = opacity;
            
            ctx.font = `${style === 'bold' ? 'bold ' : ''}${style === 'italic' ? 'italic ' : ''}${fontSize}px Arial`;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
            
            if(style === 'shadow') {
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 3;
            }
            
            ctx.lineWidth = 2;
            
            if(mode === 'repeat') {
                // Mode répété: filigrane sur toute l'image
                const textWidth = ctx.measureText(text).width;
                const textHeight = fontSize * 1.5;
                const repeatTaux = document.getElementById('repeatTaux').value;
                const spacing = repeatTaux * 50;
                
                for(let x = -textWidth; x < canvas.width; x += spacing) {
                    for(let y = -textHeight; y < canvas.height; y += spacing) {
                        ctx.save();
                        ctx.translate(x + textWidth / 2, y + textHeight / 2);
                        ctx.rotate((angle * Math.PI) / 180);
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.strokeText(text, 0, 0);
                        ctx.fillText(text, 0, 0);
                        ctx.restore();
                    }
                }
            } else {
                // Mode centre: filigrane au centre
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate((angle * Math.PI) / 180);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeText(text, 0, 0);
                ctx.fillText(text, 0, 0);
            }
            
            ctx.restore();
            
            document.getElementById('downloadBtn').style.display = 'block';
        }
        
        function downloadImage() {
            const canvas = document.getElementById('canvas');
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'filigrane.png';
            link.click();
        }
    </script>
</body>
</html>
